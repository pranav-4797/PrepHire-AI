services:
  - type: web
    name: prephire-ai-upload-server
    env: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        sync: false
      - key: GOOGLE_SHARED_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT
        sync: false
